<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Instagram Mock</title>

    <link rel="stylesheet" href="style.css">

    <!-- Material Symbols -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <!-- Swiper -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

</head>
<body>

<div class="app">

    <!-- 상단 -->
    <header class="profile-header">

        <div class="profile-top">

            <img id="profileImage"
                 src="assets/profile/profile.jpg"
                 class="profile-image">

            <div class="profile-info">

                <div class="profile-name-row">

                    <span class="username">
                        username
                    </span>

                    <span class="verified material-symbols-outlined">
                        verified
                    </span>

                </div>

                <div class="profile-stats">

                    <div>
                        <strong id="postCount">0</strong>
                        <span>게시물</span>
                    </div>

                    <div>
                        <strong>2.1만</strong>
                        <span>팔로워</span>
                    </div>

                    <div>
                        <strong>310</strong>
                        <span>팔로잉</span>
                    </div>

                </div>

            </div>

        </div>

        <div class="bio">

            <div class="display-name">
                이름
            </div>

            <div class="bio-text">
                소개글
            </div>

        </div>

        <div class="buttons">

            <button>프로필 편집</button>
            <button>프로필 공유</button>

        </div>

    </header>

    <!-- 하이라이트 -->

    <section class="highlights">

        <!-- JS 생성 -->

    </section>

    <!-- 탭 -->

    <nav class="tabs">

        <button class="tab active">

            <span class="material-symbols-outlined">
                grid_on
            </span>

        </button>

        <button class="tab">

            <span class="material-symbols-outlined">
                movie
            </span>

        </button>

        <button class="tab">

            <span class="material-symbols-outlined">
                person
            </span>

        </button>

    </nav>

    <!-- 피드 -->

    <main id="feedGrid">

    </main>

</div>


<!-- 게시물 모달 -->

<div id="postModal" class="modal hidden">

    <div class="modal-content">

        <button class="closeBtn">

            ✕

        </button>

        <div class="swiper postSwiper">

            <div class="swiper-wrapper">

            </div>

            <div class="swiper-pagination"></div>

        </div>

        <div class="postInfo">

            <div class="postHeader">

            </div>

            <div class="postActions">

            </div>

            <div class="caption">

            </div>

        </div>

    </div>

</div>


<!-- 하이라이트 뷰어 -->

<div id="storyViewer" class="hidden">

</div>


<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
